font = CaskaydiaCove Nerd Font:pixelsize=15:antialias=true
font-bold = CaskaydiaCove Nerd Font:style=Bold:pixelsize=15:antialias=true
font-italic = CaskaydiaCove Nerd Font:style=Italic:pixelsize=15:antialias=true
font-bold-italic = CaskaydiaCove Nerd Font:style=Bold Italic:pixelsize=15:antialias=true

dpi-aware=yes
pad=9x9 center
vertical-letter-offset=0px
line-height=20px
letter-spacing=0px
bold-text-in-bright=palette-based
resize-delay-ms=80

# TMUX config
# shell=/bin/env tmux -T '256,clipboard,ccolour,cstyle,focus,mouse,RGB,title' new-session


include=~/.config/foot/themes/catppuccin

# word-delimiters=,│`|:"'()[]{}<>

# pad=20x20
# pad=10x10

# resize-delay-ms=0

[security]
osc52=enabled  # disabled|copy-enabled|paste-enabled|enabled

[desktop-notifications]
command=notify-send --wait --app-name ${app-id} --icon ${app-id} --category ${category} --urgency ${urgency} --expire-time ${expire-time} --hint STRING:image-path:${icon} --hint BOOLEAN:suppress-sound:${muted} --hint STRING:sound-name:${sound-name} --replace-id ${replace-id} ${action-argument} --print-id -- ${title} ${body}
# command-action-argument=--action ${action-name}=${action-label}
# close=""
inhibit-when-focused=yes

[tweak]
font-monospace-warn=no

[bell]
urgent = yes
notify = yes
command-focused = yes

[mouse]
hide-when-typing = yes

[key-bindings]
color-theme-toggle=Control+Shift+p

[colors]
alpha = 0.85
# alpha = 0.75

url]
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode
regex=(((https?://|mailto:|ftp://|file:|ssh:|ssh://|git://|tel:|magnet:|ipfs://|ipns://|gemini://|gopher://|news:)|www\.)([0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]+|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*')+([0-9a-zA-Z/#@$&*+=~_%^\-]|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*'))


